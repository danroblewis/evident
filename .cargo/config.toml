[env]
Z3_SYS_Z3_HEADER  = "/opt/homebrew/include/z3.h"
PKG_CONFIG_PATH   = "/opt/homebrew/opt/libffi/lib/pkgconfig:/opt/homebrew/lib/pkgconfig"
LIBRARY_PATH      = "/opt/homebrew/lib"
DYLD_LIBRARY_PATH = "/opt/homebrew/lib:/opt/anaconda3/lib/python3.13/site-packages/z3/lib"

# cc-wrapper.sh patches the binary post-link with install_name_tool
# -change to rewrite "libz3.dylib" → absolute path. Without this the
# binary fails at runtime (dyld can't find libz3 because its install
# name has no @rpath/ prefix). See runtime/scripts/cc-wrapper.sh.
[target.aarch64-apple-darwin]
linker = "runtime/scripts/cc-wrapper.sh"
