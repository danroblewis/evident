<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evident IDE</title>
    <link rel="stylesheet" href="style.css">

    <!-- D3 must load before Monaco's AMD loader or it won't register as a global -->
    <script src="d3.min.js"></script>

    <!-- Monaco Editor loader -->
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
</head>
<body>

    <!-- ── Top bar ───────────────────────────────────────────────────── -->
    <div id="top-bar">
        <span class="logo">Evident</span>
        <div class="top-bar-sep"></div>

        <select id="schema-select" title="Active schema">
            <option disabled selected>Loading…</option>
        </select>

        <button id="btn-evaluate" title="Evaluate: check satisfiability and solve for a binding">
            ▶ Evaluate
        </button>
        <button id="btn-sample" title="Sample: generate N valid assignments">
            ⚂ Sample
        </button>
        <button id="btn-ranges" title="Ranges: compute min/max for each variable">
            ⟷ Ranges
        </button>

        <div class="top-bar-sep"></div>

        <button id="btn-open" title="Open a saved program or example" style="font-size:12px;">📂 Open</button>
        <button id="btn-save" title="Save program to server" style="font-size:12px;">💾 Save</button>

        <div class="spacer"></div>

        <!-- Sample count selector -->
        <label style="font-size:11px;color:var(--fg-muted);display:flex;align-items:center;gap:5px;">
            N =
            <select id="sample-n" title="Number of samples"
                    style="background:var(--bg-overlay);color:var(--fg);border:1px solid var(--border);
                           border-radius:4px;padding:2px 6px;font-size:11px;outline:none;">
                <option value="5">5</option>
                <option value="10">10</option>
                <option value="25">25</option>
                <option value="50">50</option>
                <option value="100">100</option>
                <option value="200" selected>200</option>
                <option value="300">300</option>
                <option value="500">500</option>
            </select>
        </label>

        <label style="font-size:11px;color:var(--fg-muted);display:flex;align-items:center;gap:5px;margin-left:4px;">
            Strategy:
            <select id="sample-strategy" title="Sampling strategy"
                    style="background:var(--bg-overlay);color:var(--fg);border:1px solid var(--border);
                           border-radius:4px;padding:2px 6px;font-size:11px;outline:none;">
                <option value="random" selected>random</option>
                <option value="blocking">blocking</option>
                <option value="grid">grid</option>
            </select>
        </label>
    </div>

    <!-- ── Main two-panel area ───────────────────────────────────────── -->
    <div id="main">

        <!-- Left: editor (60%) -->
        <div id="editor-panel">
            <div id="editor-container"></div>
        </div>

        <!-- Drag-to-resize handle -->
        <div id="resizer" title="Drag to resize"></div>

        <!-- Right: visualizer (40%, scrollable) -->
        <div id="visualizer-panel">

            <!-- ── Variable bindings section ────────────────────── -->
            <div id="bindings-section" class="viz-section">
                <div class="viz-section-header open" data-section="bindings">
                    <h3><span class="section-icon">⚙</span>Variable Bindings</h3>
                    <div class="section-actions">
                        <button class="section-btn" id="btn-clear-bindings" title="Clear all pinned values">Clear</button>
                        <span class="chevron">▶</span>
                    </div>
                </div>
                <div class="viz-section-body" id="bindings-body">
                    <div id="bindings-inputs">
                        <p style="color:var(--fg-muted);font-size:12px;font-style:italic">
                            Select a schema and click <strong>Ranges</strong> to load variables.
                        </p>
                    </div>
                    <div id="eval-result" style="margin-top:8px;"></div>
                </div>
            </div>

            <!-- ── Variable ranges section ───────────────────────── -->
            <div id="ranges-section" class="viz-section">
                <div class="viz-section-header open" data-section="ranges">
                    <h3><span class="section-icon">⟷</span>Variable Ranges</h3>
                    <div class="section-actions">
                        <span class="chevron">▶</span>
                    </div>
                </div>
                <div class="viz-section-body" id="ranges-body">
                    <div id="ranges-display">
                        <p class="samples-empty">Click <strong>Ranges</strong> to compute min/max bounds.</p>
                    </div>
                </div>
            </div>

            <!-- ── 2D Scatter section ────────────────────────────── -->
            <div id="scatter-section" class="viz-section">
                <div class="viz-section-header open" data-section="scatter">
                    <h3><span class="section-icon">◎</span>2D Plot</h3>
                    <div class="section-actions">
                        <span class="chevron">▶</span>
                    </div>
                </div>
                <div class="viz-section-body" id="scatter-body">
                    <div id="scatter-controls">
                        <span class="samples-empty">Run <strong>Sample</strong> first to populate axes.</span>
                    </div>
                    <div id="scatter-plot"></div>
                </div>
            </div>

            <!-- ── Sample vectors section (collapsed by default) ─── -->
            <div id="samples-section" class="viz-section">
                <div class="viz-section-header" data-section="samples">
                    <h3>
                        <span class="section-icon">⚂</span>
                        Sample Vectors
                        <span id="sample-count"></span>
                    </h3>
                    <div class="section-actions">
                        <button class="section-btn" id="export-csv-btn" title="Export as CSV">CSV</button>
                        <span class="chevron">▶</span>
                    </div>
                </div>
                <div class="viz-section-body collapsed" id="samples-body">
                    <div id="samples-table-container">
                        <p class="samples-empty">Click <strong>Sample</strong> to generate valid assignments.</p>
                    </div>
                </div>
            </div>

        </div><!-- #visualizer-panel -->
    </div><!-- #main -->

    <!-- ── Status bar ────────────────────────────────────────────────── -->
    <div id="status-bar" class="status-idle">
        <span id="status-text">Ready</span>
        <span id="cursor-position"></span>
    </div>

    <!-- ── Toast notification ─────────────────────────────────────────── -->
    <div id="toast"></div>

    <!-- ── JS modules (order matters: lang → editor → panels) ─────────── -->
    <script src="evident-lang.js"></script>
    <script src="editor.js"></script>
    <script src="schema-panel.js"></script>
    <script src="samples.js"></script>
    <script src="ranges.js"></script>
    <script src="scatter.js"></script>
    <script src="examples.js"></script>

    <script>
    'use strict';

    // ── Monaco require config ───────────────────────────────────────────
    require.config({
        paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' },
    });

    // ── Auto-evaluate ────────────────────────────────────────────────────
    let _evalTimer = null;

    async function runEvaluate() {
        const schema = document.getElementById('schema-select').value;
        if (!schema || schema === 'Loading…') return;
        const given  = getGivenBindings();
        const source = evEditor?.getSource() || '';
        if (!source.trim()) return;
        try {
            const resp = await fetch('/evaluate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ source, schema, given }),
            });
            const data = await resp.json();
            renderEvalResult(data);
        } catch (e) { /* silent on page load */ }
    }

    function scheduleAutoEvaluate() {
        clearTimeout(_evalTimer);
        _evalTimer = setTimeout(runEvaluate, 800);
    }

    // ── Boot the editor ─────────────────────────────────────────────────
    const evEditor = new EvidentEditor('editor-container');

    // First successful parse → select first schema, evaluate, start sample timer
    let _firstParse = true;
    evEditor.onSchemaListChange = (schemas) => {
        updateSchemaList(schemas);
        if (_firstParse && schemas.length > 0) {
            _firstParse = false;
            setTimeout(() => {
                runEvaluate();
                if (typeof scheduleAutoSample === 'function') scheduleAutoSample();
            }, 200);
        } else {
            scheduleAutoEvaluate();
            // Source changed — clear accumulated samples and restart
            if (typeof resetSamples === 'function') resetSamples();
        }
    };

    // Editor content change → re-evaluate after 800ms
    evEditor.onParseResult = () => scheduleAutoEvaluate();

    evEditor.init().then(async () => {
        window.evEditor = evEditor;
        // ── URL-based file loading ───────────────────────────────────────
        // ?file=name.ev  loads from /files/name.ev (saved programs)
        // ?example=name.ev  loads from /examples/name.ev (built-ins)
        const params = new URLSearchParams(window.location.search);
        const fileParam    = params.get('file');
        const exampleParam = params.get('example');
        if (fileParam || exampleParam) {
            try {
                const endpoint = fileParam ? `/files/${encodeURIComponent(fileParam)}`
                                           : `/examples/${encodeURIComponent(exampleParam)}`;
                const data = await fetch(endpoint).then(r => r.json());
                if (data.source) evEditor.editor.setValue(data.source);
            } catch (e) { /* silent — fall back to default source */ }
        }
    });

    // Schema selector change → evaluate immediately
    document.getElementById('schema-select').addEventListener('change', () => {
        runEvaluate();
        if (typeof scheduleAutoSample === 'function') scheduleAutoSample();
    });

    // ── Section collapse/expand ─────────────────────────────────────────
    document.querySelectorAll('.viz-section-header').forEach((header) => {
        header.addEventListener('click', (e) => {
            // Don't toggle when clicking buttons inside the header
            if (e.target.closest('button')) return;

            const sectionId = header.dataset.section;
            const body = document.getElementById(`${sectionId}-body`);
            if (!body) return;

            const isOpen = header.classList.contains('open');
            header.classList.toggle('open', !isOpen);
            body.classList.toggle('collapsed', isOpen);
        });
    });

    // ── Clear bindings button ───────────────────────────────────────────
    document.getElementById('btn-clear-bindings').addEventListener('click', () => {
        document.querySelectorAll('.binding-input').forEach((input) => {
            if (!input.disabled) {
                input.value = '';
                input.classList.remove('binding-solved');
            }
        });
        document.getElementById('eval-result').innerHTML = '';
    });

    // ── Evaluate button ─────────────────────────────────────────────────
    document.getElementById('btn-evaluate').addEventListener('click', async () => {
        const schema = document.getElementById('schema-select').value;
        const given  = getGivenBindings();
        const source = evEditor.getSource();

        if (!schema) return;

        const statusText = document.getElementById('status-text');
        statusText.textContent = 'Evaluating…';

        try {
            const resp = await fetch('/evaluate', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ source, schema, given }),
            });
            const data = await resp.json();

            renderEvalResult(data);

            // Update glyph decorations if the backend returned constraint status
            if (data.constraint_status) {
                evEditor.setConstraintGlyphs(data.constraint_status);
            }
        } catch (e) {
            statusText.textContent = `Evaluate failed: ${e.message}`;
        }
    });

    // ── Continuous sampling — accumulates unique samples in the scatter plot ──
    let _sampleTimer  = null;
    let _isSampling   = false;   // prevent overlapping requests

    async function runSample() {
        const schema   = document.getElementById('schema-select').value;
        const given    = getGivenBindings();
        const source   = evEditor.getSource();
        const n        = parseInt(document.getElementById('sample-n').value, 10) || 200;
        const strategy = document.getElementById('sample-strategy').value || 'random';
        if (!schema || schema === 'Loading…' || _isSampling) return;

        _isSampling = true;
        let result;
        try {
            result = await renderSamples(source, schema, given, n, strategy);
        } finally {
            _isSampling = false;
        }

        // Stop rescheduling when the accumulation cap is reached (result===false).
        if (result !== false) {
            _sampleTimer = setTimeout(runSample, 3000);
        }
    }

    function scheduleAutoSample() {
        clearTimeout(_sampleTimer);
        _sampleTimer = setTimeout(runSample, 5000);
    }

    // Clear accumulated samples and restart when source or schema changes
    function resetSamples() {
        clearTimeout(_sampleTimer);
        if (typeof clearAccumulatedSamples === 'function') clearAccumulatedSamples();
        scheduleAutoSample();
    }

    document.getElementById('schema-select').addEventListener('change', resetSamples);
    document.addEventListener('binding-changed', scheduleAutoSample);

    // Sample button: trigger immediately (still accumulates)
    document.getElementById('btn-sample').addEventListener('click', () => {
        clearTimeout(_sampleTimer);
        runSample();
    });

    // ── Ranges button ───────────────────────────────────────────────────
    document.getElementById('btn-ranges').addEventListener('click', async () => {
        const schema = document.getElementById('schema-select').value;
        const given  = getGivenBindings();
        const source = evEditor.getSource();
        if (!schema) return;
        await renderRanges(source, schema, given);
        await loadSchemaVariables(source, schema);
    });

    // ── Panel resizer ────────────────────────────────────────────────────
    (() => {
        const resizer      = document.getElementById('resizer');
        const editorPanel  = document.getElementById('editor-panel');
        const main         = document.getElementById('main');
        let dragging = false;
        let startX   = 0;
        let startW   = 0;

        resizer.addEventListener('mousedown', (e) => {
            dragging = true;
            startX   = e.clientX;
            startW   = editorPanel.offsetWidth;
            document.body.classList.add('resizing');
            resizer.classList.add('dragging');
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!dragging) return;
            const dx      = e.clientX - startX;
            const total   = main.offsetWidth;
            const newW    = Math.max(200, Math.min(total - 200, startW + dx));
            editorPanel.style.width = `${newW}px`;
            evEditor.layout();
        });

        document.addEventListener('mouseup', () => {
            if (!dragging) return;
            dragging = false;
            document.body.classList.remove('resizing');
            resizer.classList.remove('dragging');
        });
    })();

    // (Examples are accessible via the Open dialog)

    // ── Save / Open (server-backed) ──────────────────────────────────────

    function _fileModal(title, bodyHtml, onConfirm) {
        document.getElementById('error-modal')?.remove();
        const overlay = document.createElement('div');
        overlay.id = 'error-modal';
        overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;';
        const box = document.createElement('div');
        box.style.cssText = 'background:var(--bg-surface,#1e1e2e);border:1px solid var(--border,#45475a);border-radius:8px;width:min(480px,90vw);display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.5);font-family:var(--font-mono,monospace);';
        const hdr = document.createElement('div');
        hdr.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border,#45475a);font-size:13px;font-weight:600;color:var(--fg,#cdd6f4);';
        hdr.innerHTML = `<span>${title}</span>`;
        const close = document.createElement('button');
        close.textContent = '✕';
        close.style.cssText = 'background:none;border:none;color:var(--fg-muted,#6c7086);cursor:pointer;font-size:14px;padding:0 4px;';
        close.onclick = () => overlay.remove();
        hdr.appendChild(close);
        box.appendChild(hdr);
        const body = document.createElement('div');
        body.style.cssText = 'padding:16px;display:flex;flex-direction:column;gap:10px;';
        body.innerHTML = bodyHtml;
        box.appendChild(body);
        overlay.appendChild(box);
        document.body.appendChild(overlay);
        overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
        document.addEventListener('keydown', function esc(e) {
            if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', esc); }
        });
        if (onConfirm) onConfirm(overlay, body);
        return { overlay, body };
    }

    document.getElementById('btn-save').addEventListener('click', async () => {
        const info = await fetch('/files').then(r => r.json());
        const schema = document.getElementById('schema-select').value || 'program';
        const suggested = schema.toLowerCase().replace(/[^a-z0-9_-]/g, '_');

        _fileModal('Save Program', `
            <label style="font-size:11px;color:var(--fg-muted)">Filename</label>
            <div style="display:flex;gap:8px;align-items:center;">
                <input id="save-name" value="${suggested}" placeholder="filename"
                    style="flex:1;background:var(--bg-overlay);color:var(--fg);border:1px solid var(--border);border-radius:4px;padding:6px 8px;font-size:13px;font-family:inherit;outline:none;">
                <span style="color:var(--fg-muted);font-size:12px;">.ev</span>
            </div>
            <div style="font-size:11px;color:var(--fg-muted);">Directory: ${info.directory}</div>
            <button id="save-confirm" style="align-self:flex-end;padding:6px 16px;background:var(--accent,#89b4fa);color:#1e1e2e;border:none;border-radius:4px;cursor:pointer;font-weight:600;font-size:13px;">Save</button>
        `, (overlay) => {
            const inp = overlay.querySelector('#save-name');
            inp.focus(); inp.select();
            overlay.querySelector('#save-confirm').onclick = async () => {
                const name = inp.value.trim() || suggested;
                const source = evEditor.getSource();
                const resp = await fetch(`/files/${encodeURIComponent(name)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ source }),
                });
                const data = await resp.json();
                history.pushState({}, '', `?file=${encodeURIComponent(data.filename)}`);
                overlay.remove();
                // brief toast
                const t = document.createElement('div');
                t.textContent = `Saved ${data.filename}`;
                t.style.cssText = 'position:fixed;bottom:2.5rem;right:1.5rem;background:var(--green,#a6e3a1);color:#1e1e2e;padding:6px 14px;border-radius:6px;font-size:12px;z-index:9999;';
                document.body.appendChild(t);
                setTimeout(() => t.remove(), 2000);
            };
            inp.addEventListener('keydown', e => { if (e.key === 'Enter') overlay.querySelector('#save-confirm').click(); });
        });
    });

    document.getElementById('btn-open').addEventListener('click', async () => {
        const info = await fetch('/files').then(r => r.json());

        function fileRow(name, endpoint) {
            return `<div class="prog-file" data-name="${name}" data-endpoint="${endpoint}"
                style="padding:6px 10px;border-radius:4px;cursor:pointer;font-size:13px;">${name}</div>`;
        }

        const examplesHtml = (info.examples || []).length
            ? (info.examples || []).map(f => fileRow(f, 'examples')).join('')
            : '<div style="color:var(--fg-muted);font-size:12px;font-style:italic;padding:6px 10px;">None</div>';

        const savedHtml = info.files.length
            ? info.files.map(f => fileRow(f, 'files')).join('')
            : '<div style="color:var(--fg-muted);font-size:12px;font-style:italic;padding:6px 10px;">No saved programs yet.</div>';

        const sectionLabel = (t) => `<div style="font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-muted);padding:6px 10px 2px;">${t}</div>`;

        _fileModal('Open Program', `
            <div id="prog-list" style="max-height:340px;overflow-y:auto;border:1px solid var(--border);border-radius:4px;">
                ${sectionLabel('Built-in Examples')}
                ${examplesHtml}
                ${sectionLabel('Saved Programs')}
                ${savedHtml}
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
                <span style="font-size:11px;color:var(--fg-muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${info.directory}">📁 ${info.directory}</span>
                <input id="new-dir" placeholder="Change directory…"
                    style="flex:1;background:var(--bg-overlay);color:var(--fg);border:1px solid var(--border);border-radius:4px;padding:5px 8px;font-size:12px;font-family:inherit;outline:none;">
                <button id="dir-confirm" style="padding:5px 10px;background:var(--bg-overlay);color:var(--fg);border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:12px;">Set</button>
            </div>
        `, (overlay) => {
            overlay.querySelectorAll('.prog-file').forEach(el => {
                el.addEventListener('mouseenter', () => el.style.background = 'var(--bg-overlay)');
                el.addEventListener('mouseleave', () => el.style.background = '');
                el.addEventListener('click', async () => {
                    const endpoint = el.dataset.endpoint;
                    const name     = el.dataset.name;
                    const resp = await fetch(`/${endpoint}/${encodeURIComponent(name)}`);
                    const data = await resp.json();
                    evEditor.editor.setValue(data.source);
                    if (typeof resetSamples === 'function') resetSamples();
                    // Update URL so the page is bookmarkable / shareable
                    const param = endpoint === 'examples' ? 'example' : 'file';
                    history.pushState({}, '', `?${param}=${encodeURIComponent(name)}`);
                    overlay.remove();
                });
            });

            overlay.querySelector('#dir-confirm').onclick = async () => {
                const dir = overlay.querySelector('#new-dir').value.trim();
                if (!dir) return;
                await fetch('/files/config/directory', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ directory: dir }),
                });
                overlay.remove();
                document.getElementById('btn-open').click();
            };
        });
    });

    // ── Keyboard shortcuts ───────────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
        // Ctrl/Cmd + Enter → Evaluate
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
            e.preventDefault();
            document.getElementById('btn-evaluate').click();
        }
        // Ctrl/Cmd + Shift + S → Sample
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'S') {
            e.preventDefault();
            document.getElementById('btn-sample').click();
        }
        // Ctrl/Cmd + Shift + R → Ranges
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'R') {
            e.preventDefault();
            document.getElementById('btn-ranges').click();
        }
    });
    </script>
</body>
</html>
