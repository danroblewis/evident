<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Evident IDE</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="/static/app.css?v=46">
</head>
<body>
<div id="app">
  <header id="top">
    <b>◆ Evident IDE</b>
    <span id="fname" class="dim">untitled.ev</span>
    <select id="samples" title="open a worked example"></select>
    <button id="symbols-btn" title="symbols — how to type the operators (Esc to close)">⌨</button>
    <button id="glossary-btn" title="glossary — what the keywords mean (claim / Δ / := / ⇒ …). Also: hover any keyword in the editor.">📖 glossary</button>
    <button id="tour-btn" title="tour — a guided lap around the IDE (Esc to close)">?</button>
    <select id="claim-select" hidden title="this file has several entries (fsm/claim) — pick which one to render &amp; ⊨ Solve (defaults to the last-defined)"></select>
    <button id="solve-btn" title="solve a claim — SAT witness or UNSAT">⊨ Solve</button>
    <label id="scope-ctl" title="exploration / verification bound (Alloy-style scope): how many reachable states to explore. Raise it to push a capped set toward ✓ complete; lower it for speed.">scope <input id="scope-in" type="number" min="1" max="5000" placeholder="400"></label>
    <input id="unroll-in" type="number" min="1" max="64" placeholder="unroll" title="Bounded model checking: ⧉ SMT-LIB then exports the transition UNROLLED this many steps (fresh vars per tick, count@0…count@k) instead of one tick — add a property over the @ vars and (check-sat) in z3. Empty = single tick.">
    <button id="smtlib-btn" title="SMT-LIB — copy this program's SMT-LIB encoding (re-run it in z3, or save it). Set 'unroll' first for a k-step bounded-model-checking unroll.">⧉</button>
    <button id="new-btn" title="New — clear to an empty starter (confirms before discarding your current program)">🗋</button>
    <button id="revert-btn" title="Revert — discard your edits and re-load the version you last opened (sample / saved / shared)">↺</button>
    <button id="save-btn" title="Save — store this program in a named slot, keep several experiments (⌘K → Save as…)">💾</button>
    <button id="export-btn" title="Export .ev — download this buffer as a .ev file">↧</button>
    <button id="share-btn" title="Share — copy a share link, a URL that loads this exact program">🔗</button>
    <button id="pin-btn" title="pin this result as 'A' — the next analysis renders beside it. Two uses: change a constraint to see what shifted, OR switch view tabs to put two DIAGRAMS of the same program side-by-side (e.g. phase_portrait | state_graph).">📌</button>
    <button id="diff-btn" title="model-diff — pin a result (📌), change a constraint, then diff: which reachable states appeared / vanished" hidden>⇄ diff</button>
    <!-- #432: the VERDICT moved here from the cockpit body — a verdict is a property of the whole
         model (session-level status), so it lives in the frame. Compact chips: headline class +
         up to 2 evidence chips + the ⛨ soundness glyph + the ? about-this-verdict button. Each chip
         opens the Verdict dossier modal; renderVerdictHeader (app-structure.js) fills this. -->
    <span id="verdict-chips" hidden></span>
    <button id="verdict-help-btn" title="what do these verdict / interrogate terms mean?" hidden>?</button>
    <button id="cmdk-hint" title="command palette — search every action (⌘K / Ctrl-K)">⌘K</button>
    <span class="sp"></span>
    <span id="latency" class="dim"></span>
    <span id="status" class="dim">starting…</span>
  </header>

  <main id="editor-pane">
    <div id="code"></div>
    <div id="errors" hidden></div>
  </main>

  <div id="splitter" role="separator" aria-orientation="vertical" title="drag to resize"></div>

  <aside id="dynamics">
    <!-- 6a SHAPE — the one-line model-shape claim -->
    <section class="ck-region" data-label="model shape">
      <div id="banner">▷ write a constraint to see the dynamics</div>
      <details id="explainer" hidden>
        <summary>how this works</summary>
        <div class="ex-body"></div>
      </details>
    </section>

    <!-- #432: the VERDICT band is gone from the body — it moved to the header (#verdict-chips).
         #structure stays as a HIDDEN data-carrier: renderStructure still populates it (the dossier
         + header chips read its content), and app.js's recompute/hide toggles still address it by id. -->
    <div id="structure" hidden></div>

    <!-- 6c VIEW — the diagram + family tabs + caption (this region grows to fill) -->
    <section class="ck-region ck-view" data-label="view">
      <div id="tabs"></div>
      <div id="view"><div class="ph">no dynamics yet</div></div>
      <div id="view-caption" class="dim"></div>
      <label id="allcond-ctl" class="dim" hidden title="state_graph: show the GLOBAL dynamics — the transition graph over EVERY initial condition (both basins of a bistable system), not just the orbit reachable from the seeded init. Falls back to from-init for real-valued / unbounded models."><input id="allcond-in" type="checkbox"> all initial conditions</label>
      <!-- #421: axis selector for the axis-taking views (phase_portrait/nullcline/orbit/occupancy/cobweb).
           Hidden unless data.axes != null; "axes ▾" reveals two var <select>s (cobweb shows only x). -->
      <div id="axes-ctl" class="dim" hidden>
        <button id="axes-toggle" title="choose which variables go on the x / y axes of this diagram">axes ▾</button>
        <span id="axes-pick" hidden>
          <label>x <select id="axes-x"></select></label>
          <label id="axes-y-wrap">y <select id="axes-y"></select></label>
          <span id="axes-note" class="dim" hidden></span>
        </span>
      </div>
      <div id="diff-panel" hidden></div>
    </section>

    <!-- #437: the bottom INTERROGATE band is GONE — query + verify are now gallery VIEWS. The query/verify
         controls live in #interrogate-stash (their off-view home; openInteractiveView borrows them into the
         #view cell when selected). #solve keeps a thin host so the ⊨ Solve flow still renders. -->
    <div id="interrogate-stash" hidden>
      <div id="invariant" hidden>
        <span class="inv-label" title="PROVE a property holds on every state/run">⊢ verify</span>
        <input id="inv-prop" placeholder="verify (use your own vars) — safety:  var ≤ 5  ·  0 ≤ var ≤ 10     liveness:  ◇ var = 5  ·  □◇ var = 5  ·  P ⤳ Q">
        <label id="fair-ctl" title="WEAK FAIRNESS (liveness only): exclude UNFAIR runs that perpetually ignore an always-available path to the goal. □◇/◇/⤳ then hold iff the goal is reachable from every reachable (P-)state; the only fair counterexample is a TRAP. Or type a 'WF' / 'under fairness' suffix on the property."><input id="fair-in" type="checkbox"> WF</label>
        <button id="inv-btn">check</button>
        <span id="inv-result" class="dim"></span>
      </div>
      <div id="query-row" hidden>
        <span class="query-label" title="FIND one reachable state matching your condition — the ∃ dual of ⊢ verify's □. 'find' searches the bare conjunction; 'assert ⊢+' (or Enter) stacks it as an assumption and re-queries under the whole stack.">⊨? query</span>
        <input id="query-prop" placeholder="find a reachable state — a conjunction:  light = Green ∧ timer = 2     (Enter / assert ⊢+ stacks it)">
        <button id="query-btn" title="one-shot: search the bare conjunction, leave the stack untouched">find</button>
        <button id="query-assert" title="push this term onto the assumption stack and re-query under the whole stack (Enter does the same)">assert ⊢+</button>
        <span id="query-result" class="dim"></span>
      </div>
      <div id="query-stack" hidden>
        <span class="assume-label" title="the stacked assumptions — every push/pop re-queries the model under ALL of them (Z3 push/pop)">assumptions:</span>
        <span id="query-chips"></span>
        <button id="query-clear" title="retract every assumption">clear all</button>
      </div>
      <div id="query-suggest" hidden></div>
      <div id="inv-trace" hidden></div>
    </div>

    <!-- #437: the Solve panel keeps a thin host (no longer inside an INTERROGATE band) — the ⊨ Solve
         header verb populates it; it stays hidden until a solve runs. -->
    <div id="solve-host">
      <div id="solve" hidden>
        <div id="solve-head"></div>
        <div id="solve-body"></div>
        <div id="solve-controls">
          <input id="solve-given" placeholder="solve-for-X — pin e.g.  x=3, y=7">
          <button id="solve-resolve">re-solve</button>
          <button id="solve-all" title="enumerate distinct witnesses">all ⊨*</button>
          <label id="fold-sym-wrap" title="collapse witnesses that differ only by permuting interchangeable enum values (sound — only provable symmetries)"><input type="checkbox" id="fold-sym"> fold symmetric</label>
          <button id="solve-close" title="close">✕</button>
        </div>
        <div id="opt-controls" title="optimize a numeric variable subject to the claim (z3 Optimize)">
          <input id="opt-var" placeholder="optimize var — e.g.  x">
          <button id="opt-max" title="maximize this variable over the claim">⤒ max</button>
          <button id="opt-min" title="minimize this variable over the claim">⤓ min</button>
        </div>
      </div>
    </div>

    <!-- FOOTER — session-global readouts (honesty / warnings + a history-modal launcher) -->
    <footer class="ck-footer" data-label="session">
      <div class="ck-foot-row">
        <button id="history-btn" title="session history — recent analyses; click to look back at a past run" hidden>🕮 history</button>
        <div id="honesty" class="dim">—</div>
      </div>
      <pre id="warnings" hidden></pre>
      <!-- #426: the thumbnail strip moved into a modal opened by 🕮 history; kept in the DOM (hidden)
           so app.js's history-render code keeps populating it, now inside the modal. -->
      <div id="history" hidden title="recent analyses — click a thumbnail to look back at a past run"></div>
    </footer>
  </aside>
</div>

<!-- #432/#433: the Verdict dossier + the help/about overlay. Both reuse the centered-modal chrome
     (#ck-modal). Filled by app-structure.js (dossier) / app-symbols.js+app.js (help). -->
<div id="ck-modal" hidden>
  <div id="ck-modal-box">
    <div id="ck-modal-head"><span id="ck-modal-title"></span><button id="ck-modal-help" title="what do these terms mean?" hidden>?</button><button id="ck-modal-close" title="close (Esc)">✕</button></div>
    <div id="ck-modal-body"></div>
  </div>
</div>

<!-- #426: the session-history modal (the footer 🕮 opens it); #history-grid holds the thumbnails. -->
<div id="hist-modal" hidden>
  <div id="hist-modal-box">
    <div id="hist-modal-head"><span>session history</span><button id="hist-modal-close" title="close (Esc)">✕</button></div>
    <div id="history-grid"></div>
  </div>
</div>

<script src="/static/vendor/ace-ace.js"></script>
<script src="/static/vendor/ace-theme-dracula.js"></script>
<script src="/static/vendor/ace-ext-language_tools.js"></script>  <!-- autocomplete machinery (Marek #276/#279) -->

<!-- app-*.js concern files load BEFORE app.js: each defines its data + hoisted helpers and
     defers DOM wiring to an initX() that app.js calls once `editor` + the core exist. Order
     matters only for app-data.js (its DEFAULT_PROGRAM / sharedFromHash are used at app.js
     load time); the rest are cross-referenced at call time. -->
<script src="/static/app-symbols-data.js?v=1"></script> <!-- #364-followup: UNI/WORD_MNEMONICS/OP_PAIRS (split from app-data.js) -->
<script src="/static/app-data.js?v=15"></script>
<script src="/static/app-explainers.js?v=1"></script>   <!-- per-sample "how this works" copy (split from app-data.js) -->
<script src="/static/app-symbols.js?v=13"></script>
<script src="/static/app-symhint.js?v=1"></script>     <!-- #215 inline backslash symbol hint (split from app-editor.js) -->
<script src="/static/app-findreplace.js?v=1"></script> <!-- #386 find & replace bar (Ace core search APIs) -->
<script src="/static/app-editor.js?v=9"></script>
<script src="/static/app-buffer.js?v=10"></script>
<script src="/static/app-history.js?v=13"></script>
<script src="/static/app-solve.js?v=1"></script>        <!-- solve/witness result rendering + domain pictures (split from app-verify.js) -->
<script src="/static/app-trace.js?v=1"></script>        <!-- scrubbable trace + #354 diagram ring/cursor (split from app-verify.js) -->
<script src="/static/app-verify.js?v=19"></script>
<script src="/static/app-gallery.js?v=3"></script>
<script src="/static/app-palette.js?v=13"></script>
<script src="/static/app-glossary.js?v=1"></script>     <!-- #366/#374/#375 visible glossary panel + hover-to-learn hint -->
<script src="/static/app-panzoom.js?v=2"></script>
<script src="/static/app-structure.js?v=15"></script>
<script src="/static/app-axes.js?v=1"></script>          <!-- #421 axis selector (split from app.js) -->
<script src="/static/app-interactive.js?v=2"></script>   <!-- #436/#437 interactive query/verify views (split from app.js) -->
<script src="/static/app.js?v=37"></script>
</body>
</html>
