<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Evident IDE</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="/static/app.css?v=20">
</head>
<body>
<div id="app">
  <header id="top">
    <b>◆ Evident IDE</b>
    <span id="fname" class="dim">untitled.ev</span>
    <select id="samples" title="open a worked example"></select>
    <button id="symbols-btn" title="how to type the operators (Esc to close)">⌨ symbols</button>
    <button id="tour-btn" title="a guided lap around the IDE (Esc to close)">? tour</button>
    <button id="solve-btn" title="solve a claim — SAT witness or UNSAT">⊨ Solve</button>
    <label id="scope-ctl" title="exploration / verification bound (Alloy-style scope): how many reachable states to explore. Raise it to push a capped set toward ✓ complete; lower it for speed.">scope <input id="scope-in" type="number" min="1" max="5000" placeholder="400"></label>
    <button id="smtlib-btn" title="copy this program's SMT-LIB encoding (re-run it in z3, or save it)">⧉ SMT-LIB</button>
    <button id="save-btn" title="save this program in a named slot — keep several experiments (⌘K → Save as…)">💾 Save</button>
    <button id="export-btn" title="download this buffer as a .ev file">↧ .ev</button>
    <button id="share-btn" title="copy a share link — a URL that loads this exact program">🔗 Share</button>
    <button id="pin-btn" title="pin this result as 'A' — the next analysis renders beside it, so changing a constraint shows what shifted">📌 pin</button>
    <button id="diff-btn" title="model-diff — pin a result (📌), change a constraint, then diff: which reachable states appeared / vanished" hidden>⇄ diff</button>
    <button id="cmdk-hint" title="command palette — search every action (⌘K / Ctrl-K)">⌘K</button>
    <span class="sp"></span>
    <span id="latency" class="dim"></span>
    <span id="status" class="dim">starting…</span>
  </header>

  <main id="editor-pane">
    <div id="code"></div>
    <div id="errors" hidden></div>
  </main>

  <div id="splitter" role="separator" aria-orientation="vertical" title="drag to resize"></div>

  <aside id="dynamics">
    <div id="banner">▷ write a constraint to see the dynamics</div>
    <div id="structure" hidden></div>
    <div id="invariant" hidden>
      <span class="inv-label">⊢ verify</span>
      <input id="inv-prop" placeholder="verify (use your own vars) — safety:  var ≤ 5  ·  0 ≤ var ≤ 10     liveness:  ◇ var = 5  ·  □◇ var = 5  ·  P ⤳ Q">
      <button id="inv-btn">check</button>
      <span id="inv-result" class="dim"></span>
    </div>
    <div id="query-row" hidden>
      <span class="query-label" title="ad-hoc existential query — find a reachable state satisfying it (the ∃ dual of ⊢ verify's □). 'find' searches the bare conjunction; 'assert ⊢+' (or Enter) stacks it as an assumption and re-queries under the whole stack.">⊨? query</span>
      <input id="query-prop" placeholder="find a reachable state — a conjunction:  light = Green ∧ timer = 2     (Enter / assert ⊢+ stacks it)">
      <button id="query-btn" title="one-shot: search the bare conjunction, leave the stack untouched">find</button>
      <button id="query-assert" title="push this term onto the assumption stack and re-query under the whole stack (Enter does the same)">assert ⊢+</button>
      <span id="query-result" class="dim"></span>
    </div>
    <div id="query-stack" hidden>
      <span class="assume-label" title="the stacked assumptions — every push/pop re-queries the model under ALL of them (Z3 push/pop)">assumptions:</span>
      <span id="query-chips"></span>
      <button id="query-clear" title="retract every assumption">clear all</button>
    </div>
    <div id="query-suggest" hidden></div>
    <div id="inv-trace" hidden></div>
    <div id="tabs"></div>
    <div id="view"><div class="ph">no dynamics yet</div></div>
    <div id="view-caption" class="dim"></div>
    <div id="diff-panel" hidden></div>
    <div id="history" title="recent analyses — click a thumbnail to look back at a past run"></div>
    <div id="honesty" class="dim">—</div>
    <pre id="warnings" hidden></pre>
    <div id="solve" hidden>
      <div id="solve-head"></div>
      <div id="solve-body"></div>
      <div id="solve-controls">
        <input id="solve-given" placeholder="solve-for-X — pin e.g.  x=3, y=7">
        <button id="solve-resolve">re-solve</button>
        <button id="solve-all" title="enumerate distinct witnesses">all ⊨*</button>
        <button id="solve-close" title="close">✕</button>
      </div>
    </div>
  </aside>
</div>

<script src="/static/vendor/ace-ace.js"></script>
<script src="/static/vendor/ace-theme-dracula.js"></script>
<script src="/static/vendor/ace-ext-language_tools.js"></script>  <!-- autocomplete machinery (Marek #276/#279) -->

<!-- app-*.js concern files load BEFORE app.js: each defines its data + hoisted helpers and
     defers DOM wiring to an initX() that app.js calls once `editor` + the core exist. Order
     matters only for app-data.js (its DEFAULT_PROGRAM / sharedFromHash are used at app.js
     load time); the rest are cross-referenced at call time. -->
<script src="/static/app-data.js?v=5"></script>
<script src="/static/app-symbols.js?v=9"></script>
<script src="/static/app-editor.js?v=2"></script>
<script src="/static/app-buffer.js?v=3"></script>
<script src="/static/app-history.js?v=2"></script>
<script src="/static/app-verify.js?v=11"></script>
<script src="/static/app-palette.js?v=6"></script>
<script src="/static/app-panzoom.js?v=1"></script>
<script src="/static/app.js?v=21"></script>
</body>
</html>
