<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Evident IDE</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="/static/app.css?v=11">
</head>
<body>
<div id="app">
  <header id="top">
    <b>◆ Evident IDE</b>
    <span id="fname" class="dim">untitled.ev</span>
    <select id="samples" title="open a worked example"></select>
    <button id="symbols-btn" title="how to type the operators (Esc to close)">⌨ symbols</button>
    <button id="tour-btn" title="a guided lap around the IDE (Esc to close)">? tour</button>
    <button id="solve-btn" title="solve a claim — SAT witness or UNSAT">⊨ Solve</button>
    <button id="smtlib-btn" title="copy this program's SMT-LIB encoding (re-run it in z3, or save it)">⧉ SMT-LIB</button>
    <span class="sp"></span>
    <span id="latency" class="dim"></span>
    <span id="status" class="dim">starting…</span>
  </header>

  <main id="editor-pane">
    <div id="code"></div>
    <div id="errors" hidden></div>
  </main>

  <aside id="dynamics">
    <div id="banner">▷ write a constraint to see the dynamics</div>
    <div id="structure" hidden></div>
    <div id="invariant" hidden>
      <span class="inv-label">⊢ verify</span>
      <input id="inv-prop" placeholder="verify (use your own vars) — safety:  var ≤ 5  ·  0 ≤ var ≤ 10     liveness:  ◇ var = 5  ·  P ⤳ Q">
      <button id="inv-btn">check</button>
      <span id="inv-result" class="dim"></span>
    </div>
    <div id="inv-trace" hidden></div>
    <div id="tabs"></div>
    <div id="view"><div class="ph">no dynamics yet</div></div>
    <div id="honesty" class="dim">—</div>
    <pre id="warnings" hidden></pre>
    <div id="solve" hidden>
      <div id="solve-head"></div>
      <div id="solve-body"></div>
      <div id="solve-controls">
        <input id="solve-given" placeholder="solve-for-X — pin e.g.  x=3, y=7">
        <button id="solve-resolve">re-solve</button>
        <button id="solve-all" title="enumerate distinct witnesses">all ⊨*</button>
        <button id="solve-close" title="close">✕</button>
      </div>
    </div>
  </aside>
</div>

<script src="/static/vendor/ace-ace.js"></script>
<script src="/static/vendor/ace-theme-dracula.js"></script>
<script src="/static/app.js?v=11"></script>
</body>
</html>
