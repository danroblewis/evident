# Cargo doesn't support per-target [target.<triple>.env] sections —
# only the flat [env] table is recognized (see cargo book reference,
# https://doc.rust-lang.org/cargo/reference/config.html#env). Earlier
# attempts at per-target env in this file were silently ignored.
#
# So this file sets macOS paths in flat [env]. Linux users either:
#   - rely on system Z3 (`apt install libz3-dev libsdl2-dev libclang-dev`
#     puts z3.h at /usr/include/z3.h, on the default include path; no
#     env var needed); OR
#   - override Z3_SYS_Z3_HEADER + LIBRARY_PATH via shell env, which
#     wins over [env] in this file (cargo respects user-set env first).
#
# macOS-specific:
#   Z3_SYS_Z3_HEADER  → bindgen's input header. Anaconda's z3-solver
#                       package ships z3.h here, avoiding `brew install z3`.
#   LIBRARY_PATH      → linker search dirs at link time.
#                       Includes /opt/homebrew/lib for libSDL2 (brew SDL2).
#   DYLD_LIBRARY_PATH → runtime dylib search path for `cargo run` / `cargo test`.
#                       The cc-wrapper.sh below patches the binary's libz3
#                       load command to an absolute path post-link, so the
#                       built binary doesn't need DYLD_LIBRARY_PATH set.

[env]
Z3_SYS_Z3_HEADER  = "/opt/anaconda3/lib/python3.13/site-packages/z3/include/z3.h"
LIBRARY_PATH      = "/opt/anaconda3/lib/python3.13/site-packages/z3/lib:/opt/homebrew/lib"
DYLD_LIBRARY_PATH = "/opt/anaconda3/lib/python3.13/site-packages/z3/lib:/opt/homebrew/lib"

# macOS link step: wrap `cc` to immediately rewrite libz3's bare
# install_name to an absolute path post-link. ld-prime can't do this
# at link time, and cargo has no post-build hook. The wrapper is
# Mac-only — Linux ignores [target.<apple>] sections.
[target.aarch64-apple-darwin]
linker = "scripts/cc-wrapper.sh"

[target.x86_64-apple-darwin]
linker = "scripts/cc-wrapper.sh"
