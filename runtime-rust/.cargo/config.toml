# Point z3-sys at the Z3 library bundled with Python's z3-solver package.
# Avoids needing to brew install z3 separately. If Z3 is installed
# elsewhere (e.g. via homebrew), update or remove these env entries.
#
# LIBRARY_PATH also includes /opt/homebrew/lib so the linker can find
# libSDL2 (installed via `brew install sdl2`). pkg-config picks up the
# include path on its own; this list is for the link step only.
[env]
Z3_SYS_Z3_HEADER       = "/opt/anaconda3/lib/python3.13/site-packages/z3/include/z3.h"
LIBRARY_PATH           = "/opt/anaconda3/lib/python3.13/site-packages/z3/lib:/opt/homebrew/lib"
DYLD_LIBRARY_PATH      = "/opt/anaconda3/lib/python3.13/site-packages/z3/lib:/opt/homebrew/lib"

# Use a wrapper around `cc` for the link step so the produced binary's
# libz3.dylib load command is rewritten to an absolute path immediately
# after linking. ld-prime can't do this at link time and cargo has no
# post-build hook — wrapping `cc` is the cleanest fix. Result:
# `cargo build --release` produces a runnable binary with no manual
# `install_name_tool` step.
[target.aarch64-apple-darwin]
linker = "scripts/cc-wrapper.sh"

[target.x86_64-apple-darwin]
linker = "scripts/cc-wrapper.sh"
